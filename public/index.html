<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenGradient Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04070f;--surface:#0a1020;--card:#0e1628;
  --blue:#4a9eff;--blue-dim:#1e4a8a;--teal:#00e5c0;
  --text:#e8edf5;--muted:#5a6a85;--border:#1a2a45;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
a{color:var(--blue);text-decoration:none}
.header{padding:36px 24px 0;text-align:center}
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.logo-svg{width:38px;height:38px}
.site-title{font-size:24px;font-weight:700;letter-spacing:0.05em;color:var(--text)}
.tagline{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;margin-bottom:28px}
.tabs{display:flex;justify-content:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;margin:0 auto 28px}
.tab{padding:8px 28px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);letter-spacing:0.06em;transition:all 0.2s;font-family:'Syne',sans-serif}
.tab.active{background:var(--blue-dim);color:var(--blue)}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 24px 24px;max-width:720px;margin:0 auto}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--blue);font-family:'IBM Plex Mono',monospace}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.08em;margin-top:4px;
