<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenGradient Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04070f;--surface:#0a1020;--card:#0e1628;
  --blue:#4a9eff;--blue-dim:#1e4a8a;--teal:#00e5c0;
  --text:#e8edf5;--muted:#5a6a85;--border:#1a2a45;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
a{color:var(--blue);text-decoration:none}
.header{padding:36px 24px 0;text-align:center}
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.logo-svg{width:38px;height:38px}
.site-title{font-size:24px;font-weight:700;letter-spacing:0.05em;color:var(--text)}
.tagline{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;margin-bottom:28px}
.tabs{display:flex;justify-content:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;margin:0 auto 28px}
.tab{padding:8px 28px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);letter-spacing:0.06em;transition:all 0.2s;font-family:'Syne',sans-serif}
.tab.active{background:var(--blue-dim);color:var(--blue)}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 24px 24px;max-width:720px;margin:0 auto}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--blue);font-family:'IBM Plex Mono',monospace}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.08em;margin-top:4px;text-transform:uppercase}
.section{max-width:720px;margin:0 auto;padding:0 24px 60px}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:600;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase}
.live-label{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--teal);display:flex;align-items:center;gap:6px}
.glow-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.refresh-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.15s}
.refresh-btn:hover{border-color:var(--teal);color:var(--teal)}
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 36px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:border 0.2s}
.search-input:focus{border-color:var(--blue-dim)}
.controls{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ctrl-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.15s}
.ctrl-btn.active{border-color:var(--blue);color:var(--blue)}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{font-size:10px;color:var(--muted);letter-spacing:0.08em;font-family:'IBM Plex Mono',monospace;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap}
.lb-table td{padding:11px 12px;border-bottom:1px solid rgba(26,42,69,0.5);font-size:13px;vertical-align:middle}
.lb-table tr:hover td{background:rgba(74,158,255,0.03)}
.rank{font-family:'IBM Plex Mono',monospace;font-size:12px;width:36px;white-space:nowrap}
.user-cell{display:flex;align-items:center;gap:10px}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background-size:cover;background-position:center;color:#fff}
.username{font-weight:600;font-size:13px;color:var(--text)}
.num{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text)}
.num.hi{color:var(--teal)}
.num.blue{color:var(--blue)}
.level-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:rgba(74,158,255,0.1);color:var(--blue);border:1px solid rgba(74,158,255,0.15)}
.loading-state{text-align:center;padding:48px;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace}
.dots::after{content:'';animation:dotsAnim 1.5s infinite}
@keyframes dotsAnim{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace}
.error-box{background:rgba(226,75,74,0.08);border:1px solid rgba(226,75,74,0.25);border-radius:8px;padding:16px;text-align:center;margin:16px 0;font-size:12px;font-family:'IBM Plex Mono',monospace;color:#e24b4a;line-height:1.7}
.page-controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px}
.page-btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.15s}
.page-btn:disabled{opacity:0.3;cursor:not-allowed}
.page-btn:not(:disabled):hover{border-color:var(--blue);color:var(--blue)}
.page-info{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.x-placeholder{text-align:center;padding:60px 24px}
.x-placeholder .icon{font-size:36px;opacity:0.2;margin-bottom:16px}
.x-placeholder p{color:var(--muted);font-size:13px;line-height:1.7}
.footer{text-align:center;padding:24px;font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:520px){
  .stats-bar{grid-template-columns:1fr 1fr}
  .stat-card:last-child{grid-column:span 2}
  .lb-table th:nth-child(4),.lb-table td:nth-child(4){display:none}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo-row">
    <svg class="logo-svg" viewBox="0 0 38 38" fill="none">
      <circle cx="19" cy="19" r="18" stroke="#4a9eff" stroke-width="1.5"/>
      <path d="M9.5 19 Q14 10 19 19 Q24 28 28.5 19" stroke="#4a9eff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="19" cy="19" r="3.5" fill="#00e5c0"/>
      <circle cx="9.5" cy="19" r="2.5" fill="#4a9eff" opacity="0.7"/>
      <circle cx="28.5" cy="19" r="2.5" fill="#4a9eff" opacity="0.7"/>
    </svg>
    <span class="site-title">OPENGRADIENT</span>
  </div>
  <div class="tagline">COMMUNITY LEADERBOARD &nbsp;·&nbsp; LIVE DATA</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('discord',this)">DISCORD</button>
    <button class="tab" onclick="switchTab('x',this)">X / TWITTER</button>
  </div>
</div>
<div class="stats-bar">
  <div class="stat-card"><div class="stat-val" id="s-total">—</div><div class="stat-label">On Leaderboard</div></div>
  <div class="stat-card"><div class="stat-val" id="s-topmsg">—</div><div class="stat-label">Top Messages</div></div>
  <div class="stat-card"><div class="stat-val" id="s-avglvl">—</div><div class="stat-label">Avg Level</div></div>
</div>
<div class="section">
  <div class="header-row">
    <div class="sec-title" id="sec-label">Discord Activity</div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="refresh-btn" onclick="init()">↻ Refresh</button>
      <div class="live-label"><span class="glow-dot"></span>LIVE</div>
    </div>
  </div>
  <div id="discord-panel">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="search-d" placeholder="Search username..." oninput="applyFilter()">
    </div>
    <div class="controls">
      <button class="ctrl-btn active" onclick="setSort('msgs',this)">Messages</button>
      <button class="ctrl-btn" onclick="setSort('xp',this)">XP</button>
      <button class="ctrl-btn" onclick="setSort('lvl',this)">Level</button>
      <button class="ctrl-btn" onclick="setSort('name',this)">Name A–Z</button>
    </div>
    <div id="d-content"><div class="loading-state"><span class="dots">Connecting to MEE6</span></div></div>
    <div class="page-controls" id="d-pages" style="display:none">
      <button class="page-btn" id="d-prev" onclick="goPage(-1)">← Prev</button>
      <span class="page-info" id="d-pinfo"></span>
      <button class="page-btn" id="d-next" onclick="goPage(1)">Next →</button>
    </div>
  </div>
  <div id="x-panel" style="display:none">
    <div class="x-placeholder">
      <div class="icon">𝕏</div>
      <p>X / Twitter integration requires paid API access.<br>Coming soon.</p>
      <br><small>Twitter API Basic tier: $100/month</small>
    </div>
  </div>
</div>
<div class="footer">© 2026 OPENGRADIENT LEADERBOARD &nbsp;·&nbsp; DATA VIA MEE6</div>
<script>
const PER=25;
let allUsers=[],filtered=[],curPage=0,sortKey='msgs';
const avColors=['#1a3a6e','#0d3323','#331a5e','#1a3240','#3d220f','#0f3028','#221a3d','#3a1a2e'];
const avColor=n=>avColors[(n||'a').charCodeAt(0)%avColors.length];
const initials=n=>{const p=(n||'?').replace(/[^a-zA-Z0-9]/g,' ').trim().split(/\s+/);return p.length>1?p[0][0].toUpperCase()+p[1][0].toUpperCase():(n[0]||'?').toUpperCase()};
const fmt=n=>{if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return(n||0).toLocaleString()};
const rankLabel=i=>{if(i===0)return'<span style="font-size:16px">🥇</span>';if(i===1)return'<span style="font-size:16px">🥈</span>';if(i===2)return'<span style="font-size:16px">🥉</span>';return`<span style="color:var(--muted);font-family:'IBM Plex Mono',monospace">#${i+1}</span>`};
async function fetchPage(p){const res=await fetch(`/api/mee6?page=${p}`);if(!res.ok)throw new Error(`HTTP ${res.status}`);return res.json()}
async function init(){
  allUsers=[];
  document.getElementById('d-content').innerHTML='<div class="loading-state"><span class="dots">Connecting to MEE6</span></div>';
  document.getElementById('d-pages').style.display='none';
  document.getElementById('s-total').textContent='—';
  document.getElementById('s-topmsg').textContent='—';
  document.getElementById('s-avglvl').textContent='—';
  try{
    const first=await fetchPage(0);
    if(!first.players||!first.players.length)throw new Error('No players');
    allUsers=[...first.players];
    updateStats();applyFilter();
    if(first.players.length===100){
      for(let p=1;p<=9;p++){
        try{const more=await fetchPage(p);if(!more.players||!more.players.length)break;allUsers=[...allUsers,...more.players];updateStats();applyFilter();if(more.players.length<100)break;}catch{break}
      }
    }
  }catch(e){document.getElementById('d-content').innerHTML=`<div class="error-box">⚠ Cannot reach MEE6 API<br><span style="opacity:0.6;font-size:10px">${e.message}</span></div>`}
}
function updateStats(){
  const msgs=allUsers.map(u=>u.message_count||0);
  const lvls=allUsers.map(u=>u.level||0);
  document.getElementById('s-total').textContent=fmt(allUsers.length);
  document.getElementById('s-topmsg').textContent=fmt(Math.max(0,...msgs));
  document.getElementById('s-avglvl').textContent=lvls.length?Math.round(lvls.reduce((a,b)=>a+b,0)/lvls.length):'—';
}
function applyFilter(){
  const q=(document.getElementById('search-d').value||'').toLowerCase();
  let d=[...allUsers].filter(u=>(u.username||'').toLowerCase().includes(q));
  if(sortKey==='msgs')d.sort((a,b)=>(b.message_count||0)-(a.message_count||0));
  else if(sortKey==='xp')d.sort((a,b)=>(b.xp||0)-(a.xp||0));
  else if(sortKey==='lvl')d.sort((a,b)=>(b.level||0)-(a.level||0));
  else d.sort((a,b)=>(a.username||'').localeCompare(b.username||''));
  filtered=d;curPage=0;renderPage();
}
function renderPage(){
  const start=curPage*PER;
  const slice=filtered.slice(start,start+PER);
  const totalPages=Math.ceil(filtered.length/PER);
  if(!slice.length){document.getElementById('d-content').innerHTML='<div class="empty">No results found</div>';document.getElementById('d-pages').style.display='none';return}
  document.getElementById('d-content').innerHTML=`<table class="lb-table"><thead><tr><th>#</th><th>User</th><th>Messages</th><th>XP</th><th>Level</th></tr></thead><tbody>${slice.map((u,i)=>{const rank=start+i;const avUrl=u.avatar?`https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.webp?size=32`:'';const avStyle=avUrl?`background-image:url('${avUrl}');background-color:${avColor(u.username)}`:`background:${avColor(u.username)}`;return`<tr><td class="rank">${rankLabel(rank)}</td><td><div class="user-cell"><div class="avatar" style="${avStyle}">${avUrl?'':initials(u.username)}</div><span class="username">${u.username||'unknown'}</span></div></td><td><span class="num hi">${fmt(u.message_count||0)}</span></td><td><span class="num blue">${fmt(u.xp||0)}</span></td><td><span class="level-badge">LVL ${u.level||0}</span></td></tr>`}).join('')}</tbody></table>`;
  if(totalPages>1){document.getElementById('d-pages').style.display='flex';document.getElementById('d-pinfo').textContent=`${curPage+1} / ${totalPages}`;document.getElementById('d-prev').disabled=curPage===0;document.getElementById('d-next').disabled=curPage>=totalPages-1}
  else document.getElementById('d-pages').style.display='none';
}
function setSort(k,el){sortKey=k;document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');applyFilter()}
function goPage(d){curPage+=d;renderPage();window.scrollTo({top:0,behavior:'smooth'})}
function switchTab(t,el){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('discord-panel').style.display=t==='discord'?'block':'none';document.getElementById('x-panel').style.display=t==='x'?'block':'none';document.getElementById('sec-label').textContent=t==='discord'?'Discord Activity':'X / Twitter Activity'}
init();
</script>
</body>
</html>
